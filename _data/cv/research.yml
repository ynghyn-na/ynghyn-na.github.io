- title: 'Independent Research Project: KAIST × Nupjuki Hwatu Card Design'
  duration: 'Summer 2026–Present'
  advisor: 'Advised by Prof. Hyun-Jung Suk, KAIST'
#  image: ''
  link: 'https://docs.google.com/presentation/d/1Pn3nRnMufZv2zwCwM2oNbIEf_KMZT89vgQZNC_FUtOI/edit?usp=sharing'
#  report: ''
  description: |
    <ul style="font-size: 0.9em;">
      <li>Developing a functional Korean hwatu card set that integrates traditional hwatu game structure with KAIST campus culture and the Nupjuki character.</li>
      <li>Analyzing the visual grammar of Korean hwatu cards, including monthly symbols, gwang, tti, yeolkkeut, and pi, to preserve game usability while improving visual recognition.</li>
      <li>Combining hand sketching, visual reference research, AI-assisted ideation, and iterative feedback from design professionals.</li>
      <li>Documenting the development process for potential presentation as a design development case study or undergraduate conference project.</li>
      <li>Exploring premium production ideas such as refined card-back patterns, holographic finishing, and visual anti-counterfeiting elements for collectible campus goods.</li>
    </ul>
